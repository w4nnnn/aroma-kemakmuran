services:
  pocketbase:
    build: 
      context: ./pocketbase
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-2200}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_PB_URL=http://localhost:3000
      - INTERNAL_PB_URL=${INTERNAL_PB_URL:-http://pocketbase:8090}
    depends_on:
      - pocketbase
