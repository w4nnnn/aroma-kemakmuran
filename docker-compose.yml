version: '3.8'

services:
  pocketbase:
    build: 
      context: ./pocketbase
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_PB_URL=http://127.0.0.1:8090
      - INTERNAL_PB_URL=http://pocketbase:8090
    depends_on:
      - pocketbase
